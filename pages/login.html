<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish / Ro'yxatdan o'tish - MexmonXona</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 70px 1rem 2rem; }
    .auth-card { background: white; border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 460px; box-shadow: var(--shadow-xl); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-tabs { display: flex; gap: 0; background: var(--bg-light); border-radius: var(--radius-md); padding: 4px; margin-bottom: 2rem; }
    .auth-tab { flex: 1; text-align: center; padding: 0.625rem; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: var(--transition); color: var(--text-secondary); border: none; background: none; }
    .auth-tab.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }
    .divider-or { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: var(--text-secondary); font-size: 0.825rem; }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .social-auth { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .social-auth-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0.7rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: var(--transition); background: white; color: var(--text-primary); }
    .social-auth-btn:hover { border-color: var(--accent); background: var(--bg-light); }
  </style>
</head>
<body>
<div id="navbarContainer"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html" class="navbar-brand" style="justify-content:center;margin-bottom:0.5rem;display:flex">
        <div class="brand-logo">🏨</div>
        <span class="brand-text">Mexmon<span>Xona</span></span>
      </a>
      <p style="color:var(--text-secondary);font-size:0.875rem">Xush kelibsiz!</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Kirish</button>
      <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="social-auth">
        <button class="social-auth-btn" onclick="showToast('Google kirish demonstratsiya', 'info')">🔵 Google</button>
        <button class="social-auth-btn" onclick="showToast('Telegram kirish demonstratsiya', 'info')">💙 Telegram</button>
      </div>
      <div class="divider-or">yoki</div>
      <div class="form-group">
        <label class="form-label">Email manzil</label>
        <div class="input-icon-wrap">
          <span class="input-icon">📧</span>
          <input type="email" class="form-control" id="loginEmail" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          <span>Parol</span>
          <a href="#" style="font-size:0.78rem;color:var(--accent-dark)">Parolni unutdingizmi?</a>
        </label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">
        <input type="checkbox" id="rememberMe" style="accent-color:var(--accent)">
        <label for="rememberMe" style="font-size:0.85rem;color:var(--text-secondary)">Meni eslab qol</label>
      </div>
      <button class="btn btn-primary w-full btn-lg" onclick="doLogin()">Kirish →</button>
      <p style="text-align:center;margin-top:1rem;color:var(--text-secondary);font-size:0.825rem">
        Hisobing yo'qmi? <a href="#" onclick="switchTab('register')" style="color:var(--accent-dark);font-weight:700">Ro'yxatdan o'ting</a>
      </p>
      <div style="margin-top:1rem;padding:0.75rem;background:var(--bg-light);border-radius:var(--radius-sm);font-size:0.78rem;color:var(--text-secondary)">
        <strong>Demo kirish:</strong><br>
        Admin: admin@mexmonxona.uz / admin123
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Ism <span class="required">*</span></label>
          <input type="text" class="form-control" id="regFirstName" placeholder="Ismingiz">
        </div>
        <div class="form-group">
          <label class="form-label">Familiya <span class="required">*</span></label>
          <input type="text" class="form-control" id="regLastName" placeholder="Familiyangiz">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">📧</span>
          <input type="email" class="form-control" id="regEmail" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Telefon</label>
        <div class="input-icon-wrap">
          <span class="input-icon">📞</span>
          <input type="tel" class="form-control" id="regPhone" placeholder="+998 90 000-0000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Parol <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-control" id="regPassword" placeholder="Minimum 6 ta belgi">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Parolni tasdiqlang <span class="required">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-control" id="regPassword2" placeholder="Parolni qaytaring">
        </div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:1.25rem">
        <input type="checkbox" id="agreeTerms" style="accent-color:var(--accent);margin-top:3px">
        <label for="agreeTerms" style="font-size:0.82rem;color:var(--text-secondary)">
          <a href="#" style="color:var(--accent-dark)">Foydalanish shartlari</a> va 
          <a href="#" style="color:var(--accent-dark)">Maxfiylik siyosati</a>ga roziman
        </label>
      </div>
      <button class="btn btn-primary w-full btn-lg" onclick="doRegister()">Ro'yxatdan o'tish →</button>
      <p style="text-align:center;margin-top:1rem;color:var(--text-secondary);font-size:0.825rem">
        Hisobingiz bormi? <a href="#" onclick="switchTab('login')" style="color:var(--accent-dark);font-weight:700">Kiring</a>
      </p>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  document.getElementById('navbarContainer').innerHTML = renderNavbar('');

  // Check URL mode
  const mode = new URLSearchParams(location.search).get('mode');
  if (mode === 'register') switchTab('register');

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginTab').classList.toggle('active', isLogin);
    document.getElementById('registerTab').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
  }

  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (!email || !pass) { showToast('Email va parolni kiriting', 'warning'); return; }
    const user = DB.login(email, pass);
    if (user) {
      showToast(`Xush kelibsiz, ${user.name}! 👋`, 'success');
      setTimeout(() => {
        window.location.href = user.role === 'admin' ? 'admin.html' : '../index.html';
      }, 1000);
    } else {
      showToast('Email yoki parol noto\'g\'ri', 'error');
    }
  }

  function doRegister() {
    const fn = document.getElementById('regFirstName').value.trim();
    const ln = document.getElementById('regLastName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const pass = document.getElementById('regPassword').value;
    const pass2 = document.getElementById('regPassword2').value;
    const agree = document.getElementById('agreeTerms').checked;
    if (!fn || !ln || !email || !pass) { showToast('Barcha maydonlarni to\'ldiring', 'warning'); return; }
    if (!email.includes('@')) { showToast('Email noto\'g\'ri', 'error'); return; }
    if (pass.length < 6) { showToast('Parol kamida 6 ta belgi bo\'lishi kerak', 'warning'); return; }
    if (pass !== pass2) { showToast('Parollar mos kelmadi', 'error'); return; }
    if (!agree) { showToast('Foydalanish shartlariga rozilik bering', 'warning'); return; }
    const user = DB.register({ name: fn + ' ' + ln, email, phone, password: pass });
    if (user) {
      showToast('Muvaffaqiyatli ro\'yxatdan o\'tdingiz! 🎉', 'success');
      setTimeout(() => window.location.href = '../index.html', 1000);
    } else {
      showToast('Bu email allaqachon ro\'yxatdan o\'tgan', 'error');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const isLogin = !document.getElementById('loginForm').classList.contains('hidden');
      if (isLogin) doLogin(); else doRegister();
    }
  });
</script>
</body>
</html>
