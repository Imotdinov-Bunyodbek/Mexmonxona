<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mening Bronlarim - MexmonXona</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<div id="navbarContainer"></div>
<div style="height:70px"></div>

<section style="background:linear-gradient(135deg,var(--primary),var(--secondary));padding:3rem 2rem;text-align:center">
  <div class="section-badge" style="background:rgba(232,184,109,0.15);color:var(--accent)">📋 Bronlarim</div>
  <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:white;margin-top:0.75rem">Mening Bronlarim</h1>
</section>

<section class="section">
  <div class="container" style="max-width:900px">
    <div style="display:flex;gap:0.625rem;margin-bottom:2rem">
      <button class="btn btn-primary btn-sm" onclick="filterMyBookings('all')" id="f-all">Barchasi</button>
      <button class="btn btn-outline btn-sm" onclick="filterMyBookings('Tasdiqlandi')" id="f-conf">Tasdiqlangan</button>
      <button class="btn btn-outline btn-sm" onclick="filterMyBookings('Bekor qilindi')" id="f-cancel">Bekor qilingan</button>
    </div>
    <div id="myBookingsList"></div>
    <div id="noBookings" class="hidden" style="text-align:center;padding:4rem 2rem">
      <div style="font-size:4rem;margin-bottom:1rem">📭</div>
      <h3 style="font-size:1.25rem;margin-bottom:0.5rem">Bronlar yo'q</h3>
      <p style="color:var(--text-secondary);margin-bottom:1.5rem">Hozircha hech qanday bron mavjud emas</p>
      <a href="hotels.html" class="btn btn-primary">Mehmonxona Qidirish →</a>
    </div>
  </div>
</section>

<div id="footerContainer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  const user = DB.getCurrentUser();
  if (!user) window.location.href = 'login.html';
  document.getElementById('navbarContainer').innerHTML = renderNavbar('');
  document.getElementById('footerContainer').innerHTML = renderFooter();

  function filterMyBookings(status) {
    let bookings = DB.getBookings();
    if (user.role !== 'admin') {
      bookings = bookings.filter(b => b.guestEmail === user.email);
    }
    if (status !== 'all') bookings = bookings.filter(b => b.status === status);
    renderMyBookings(bookings.reverse());
  }

  function renderMyBookings(bookings) {
    const list = document.getElementById('myBookingsList');
    const noB = document.getElementById('noBookings');
    if (bookings.length === 0) { list.innerHTML = ''; noB.classList.remove('hidden'); return; }
    noB.classList.add('hidden');
    list.innerHTML = bookings.map(b => `
      <div style="background:white;border-radius:var(--radius-xl);border:1px solid var(--border);padding:1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem">
          <div>
            <span style="font-size:0.78rem;color:var(--text-secondary)">Bron №</span>
            <div style="font-weight:800;font-size:1.05rem">#${b.id}</div>
          </div>
          <span class="badge ${b.status==='Tasdiqlandi'?'badge-success':'badge-danger'}" style="font-size:0.8rem">${b.status}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;padding:1.25rem;background:var(--bg-light);border-radius:var(--radius-md);margin-bottom:1.25rem">
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">Mehmonxona</div><div style="font-weight:700">${b.hotelName}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">Xona</div><div style="font-weight:700">${b.roomType}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">Kirish</div><div style="font-weight:700">${formatDate(b.checkin)}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">Chiqish</div><div style="font-weight:700">${formatDate(b.checkout)}</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">Tunlar</div><div style="font-weight:700">${b.nights} tun</div></div>
          <div><div style="font-size:0.75rem;color:var(--text-secondary)">To'lov</div><div style="font-weight:700;color:var(--accent-dark)">${DB.formatPrice(b.totalPrice)}</div></div>
        </div>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
          <a href="booking.html?hotel=${b.hotelId}" class="btn btn-primary btn-sm">Qayta Bron Qilish</a>
          ${b.status === 'Tasdiqlandi' ? `<button class="btn btn-outline btn-sm btn-danger" onclick="cancelMyBooking(${b.id})" style="color:var(--danger);border-color:var(--danger)">Bekor Qilish</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function cancelMyBooking(id) {
    if (!confirm('Ushbu bronni bekor qilmoqchimisiz?')) return;
    const bookings = DB.getBookings().map(b => b.id === id ? {...b, status: 'Bekor qilindi'} : b);
    DB.saveBookings(bookings);
    showToast('Bron bekor qilindi', 'warning');
    filterMyBookings('all');
  }

  filterMyBookings('all');
</script>
</body>
</html>
